name: AutoResearch-RL CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy scipy torch zstandard

    - name: Run pytest
      run: |
        pytest tests/

    - name: Run End-to-End Local Loop
      env:
        AUTORESEARCH_MODE: LOCAL
      run: |
        python main.py --max_iterations 1
